services:
  newsstack:
    build: .
    ports:
      - "8080:8080"
    environment:
      NEWSSTACK_QDRANT_URL: http://qdrant:6333
      NEWSSTACK_EMBEDDING_URL: http://host.docker.internal:9097/v1/embeddings
      NEWSSTACK_LLM_URL: http://host.docker.internal:9096/v1/chat/completions
      NEWSSTACK_DB_PATH: /data/newsstack.db
    volumes:
      - newsstack-data:/data
    depends_on:
      qdrant:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  newsstack-data:
  qdrant-data:
